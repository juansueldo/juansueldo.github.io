    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous">>

<body class="hidden">

        <nav class="header__navbar">
            <a href="#" class="header__navbar__logo">Juan <span class="highlight" id="color">Sueldo</span></a>

            <ul class="header__navbar__menu" id="menu">
                <li><a href="#home-section" class="header__navbar__menu__link is-active">Inicio</a></li>
                <li><a href="#about-section" class="header__navbar__menu__link">Sobre mi</a></li>
                <li><a href="#projects-section" class="header__navbar__menu__link">Proyectos</a></li>
                <li><a href="#contact-section" class="header__navbar__menu__link">Contacto</a></li>
            </ul>
        </nav>
    </header>
    <section class="home" id="home-section">
        <div class="home__container">
            <div class="home__container__left">
                <h1 class="home__container__left__title"><span class="highlight">hola, <br></span> soy Juan</h1>
                <div class="home__container__left__container">
                    <div class="box reflect" id="link-w98">
                        <h1>WEB <span class="highlight">DEVELOPER</span></h1>
                    </div>
                </div>
            </div>
            <div class="home__container__right">
                <div class="home__container__right__cube">
                <div class="home__container__right__top"></div>
                <div>
                    <span class="reflect" style="--i:0;"></span>
                    <span class="reflect" style="--i:1;"></span>
                    <span class="reflect" style="--i:2;"></span>
                    <span class="reflect" style="--i:3;"></span>
                </div>
               </div> 
            </div>
        </div>
    </section>
    <section class="projects" id="projects-section">
        <h2 class="projects__title title"><span class="highlight uppercase">Proyectos</span></h2>
        <div class="slider">
            <div class="projects__box-container slider__track">
                <div class="box-project project-1">
                    <div class="card__title">
                        <h2>Project Description 1</h2>
                    </div>
                    <div class="card__proyect-links">
                        <a href="#"><i class="fab fa-github highlight"></i></a>
                        <a href="#"><i class="fas fa-globe-asia highlight"></i></a>
                    </div>
                </div>
                <!-- Repite con tus proyectos -->
                <div class="box-project project-2">
                    <div class="card__title">
                        <h2>Project Description 2</h2>
                    </div>
                    <div class="card__proyect-links">
                        <a href="#"><i class="fab fa-github highlight"></i></a>
                        <a href="#"><i class="fas fa-globe-asia highlight"></i></a>
                    </div>
                </div>

                <div class="box-project project-3">
                    <div class="card__title">
                        <h2>Project Description 3</h2>
                    </div>
                    <div class="card__proyect-links">
                        <a href="#"><i class="fab fa-github highlight"></i></a>
                        <a href="#"><i class="fas fa-globe-asia highlight"></i></a>
                    </div>
                </div>
                <!-- Añade más proyectos -->
            </div>
            <button class="slider__btn slider__btn--prev"><i class='bx bx-chevron-left highlight'></i></button>
            <button class="slider__btn slider__btn--next"><i class='bx bx-chevron-right highlight'></i></button>
        </div>
    </section>
    <section class="contact" id="contact-section">
        <h2 class="contact__title title"><span class="highlight uppercase">Contacto</span></h2>
        <form class="contact-form" action="https://formsubmit.co/juan.sueldo1989@gmail.com" method="POST">
            <div class="name">
                <input type="text" class="first-name" required placeholder="Nombre" name="nombre">
                <input type="text" class="last-name" required placeholder="Apellido" name="apellido">
            </div>
            <input type="email" required class="email" placeholder="Email" name="email">
            <textarea class="message" placeholder="Mensaje" required name="mensaje"></textarea>
            <div class="btn-box">
                <div class="container-btn">
                    <button class="download" type="submit"><span class="highlight">Enviar</span></button>
                </div>
            </div>
        </form>
    </section>

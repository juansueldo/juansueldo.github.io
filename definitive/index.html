<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header id="header">
        <div class="logo"><a href="#home">Juan <span class="highlight-alt">Sueldo</span></a></div>
        <div class="menu-toggle" aria-label="Toggle menu">
            <span></span>
            
        </div>
        <nav class="nav-links">
            <a href="#home">Home</a>
            <a href="#experience">Experience</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
        </nav>
    </header>

    <section id="home">
        <img alt="Hero" loading="lazy" width="1772" height="795" decoding="async" data-nimg="1" class="absolute top-0 -z-10" style="color:transparent" src="/section.svg">
        <div class="hero">
            <h1>Hello,<br>I'm <span class="highlight-alt">Juan Sueldo</span>,<br>
                <span class="highlight">Web Developer</span>.
            </h1>
            <div class="social-media">
                <a href=""><i class="fa-brands fa-github"></i></a>
                <a href=""><i class="fa-brands fa-linkedin"></i></a>
            </div>
            <div class="buttons">
                <button class="btn-resume">Get Resume <i class="fa-solid fa-download"></i></button>
            </div>
        </div>
        <div class="box">

            <div class="code-section">
                <div class="code-header">
                    <div class="button close"></div>
                    <div class="button minimize"></div>
                    <div class="button maximize"></div>
                </div>
            <div class="code-body">
                <textarea id="codeEditor">const coder = {
      name: 'Juan Sueldo',
      skills: ['Laravel', 'Angular', '.NET', 'React'],
      hardWorker: true,
      quickLearner: true,
      problemSolver: true,
      hireable: function() {
            return this.hardWorker && this.problemSolver && this.skills.length >= 5;
            }
        };
                </textarea>
            </div>
            </div>
        </div>
    </section>
    <section id="experience">
        <img alt="Hero" loading="lazy" width="1772" height="795" decoding="async" data-nimg="1" class="absolute top-0 -z-10" style="color:transparent" src="/section.svg">
        <h2 class="section-title highlight-alt">Experience</h2>
        <div class="code-section card">
            <div class="code-header">
                <div class="button close"></div>
                <div class="button minimize"></div>
                <div class="button maximize"></div>
            </div>
        <div class="code-body">
                <h3 class="company-name">Interplan</h3>
                <p class="position">Full Stack Developer</p>
                <p class="date">2023 - Present</p>
                <ul class="responsibilities">
                  
                </ul>
            </div>
        </div>
    </section>
    
    <script src="js/script.js"></script>
</body>
</html>
